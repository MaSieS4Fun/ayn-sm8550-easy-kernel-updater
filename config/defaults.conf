# ayn-sm8550-kernel — defaults
# Supported kernel series are discovered at runtime from Armbian (see lib/armbian-support.sh)

KERNEL_CDN="https://cdn.kernel.org/pub/linux/kernel"
ARMBIAN_PATCH_RAW="https://github.com/armbian/build/raw/main"

KERNEL_LOCALVERSION="-edge-sm8550"
JOBS="${JOBS:-$(nproc)}"

# strict = abort if any patch fails (default)
PATCH_POLICY="${PATCH_POLICY:-strict}"

PATCH_SKIP="${PATCH_SKIP:-}"
KERNEL_VER="${KERNEL_VER:-}"

# Gaming tuning on every build (default on)
GAMING_TUNING="${GAMING_TUNING:-1}"

# Initramfs without early DRM (HDMI-at-boot safe)
INITRAMFS_PROFILE="${INITRAMFS_PROFILE:-minimal}"

# Boot layout: auto-detect LinuxLoader vs EFI/GRUB from /boot (no user choice needed)
BOOT_PROFILE="${BOOT_PROFILE:-auto}"

KERNEL_VERSIONS_PER_SERIES="${KERNEL_VERSIONS_PER_SERIES:-5}"

kernel_major_minor() {
    local ver="$1"
    echo "${ver%.*}"
}

resolve_kernel_config() {
    local target_ver="${1:-}"

    if [[ -n "${KERNEL_CONFIG:-}" && -f "${KERNEL_CONFIG}" ]]; then
        echo "${KERNEL_CONFIG}"
        return 0
    fi

    if [[ -f "${ROOT}/config/golden.config" ]]; then
        echo "${ROOT}/config/golden.config"
        return 0
    fi

    echo "WARNING: No config/golden.config — using Armbian defconfig (suboptimal for gaming)." >&2
    fetch_armbian_defconfig
}
