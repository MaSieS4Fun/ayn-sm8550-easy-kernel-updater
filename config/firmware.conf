# Firmware pipeline — ROCKNIX-style trimmed set for SM8550
# Synced from ROCKNIX/distribution (branch next) + AYN vendor overlays.

# linux-firmware tarball (ROCKNIX kernel-firmware package.mk)
LINUX_FIRMWARE_VERSION="${LINUX_FIRMWARE_VERSION:-20250509}"
LINUX_FIRMWARE_SHA256="${LINUX_FIRMWARE_SHA256:-f2c60d66f226a28130cb5643e6e544d3229673460e127c91ba03f1080cbd703e}"
KERNEL_FIRMWARE_CDN="${KERNEL_FIRMWARE_CDN:-https://cdn.kernel.org/pub/linux/kernel/firmware}"

# rocknix = download linux-firmware + manifest (default)
# system  = legacy copy from /lib/firmware only
FIRMWARE_POLICY="${FIRMWARE_POLICY:-rocknix}"

# Abort build if manifest patterns match zero files (1) or warn only (0)
FIRMWARE_STRICT="${FIRMWARE_STRICT:-1}"

# ROCKNIX SM8550 kernel-firmware.dat source (for scripts/sync-firmware-manifest.sh)
ROCKNIX_FIRMWARE_DAT_URL="${ROCKNIX_FIRMWARE_DAT_URL:-https://raw.githubusercontent.com/ROCKNIX/distribution/next/projects/ROCKNIX/devices/SM8550/config/kernel-firmware.dat}"
