# Patch skip profiles for gaming perf bisect (Armbian sm8550-* set).
# Use: PERF_PROFILE=gaming-qos ./update.sh
# Merged with PATCH_SKIP if both are set.

perf_profile_description() {
    case "${1}" in
        full)        echo "All Armbian patches (default)" ;;
        gaming-qos)  echo "Skip interconnect QoS (0122)" ;;
        gaming-opp)  echo "Skip OPP acd-level (0154)" ;;
        gaming-bw)   echo "Skip DDR/LLCC/L3 bandwidth scaling (0101)" ;;
        gaming-icc)  echo "Skip QoS + crypto ICC bandwidth patches" ;;
        gaming)      echo "Skip top perf suspects (QoS, OPP, bandwidth, crypto ICC)" ;;
        gaming-l2)   echo "Skip L2 cache / cpu2 patch (0100)" ;;
        gaming-gpu)  echo "Skip GPU_CC power-domains patch (0120)" ;;
        gaming-l2gpu) echo "Skip 0100 + 0120 + gaming bundle" ;;
        *)           echo "Unknown profile" ;;
    esac
}

perf_profile_skip_list() {
    case "${1}" in
        full|"")     echo "" ;;
        gaming-qos)  echo "0122-interconnect__qcom__sm8550__Enable_QoS" ;;
        gaming-opp)  echo "0154-dts-qcom-sm8550-add-opp-acd" ;;
        gaming-bw)   echo "0101-SM8550-Add-DDR-LLCC-L3" ;;
        gaming-icc)  echo "0122-interconnect__qcom__sm8550__Enable_QoS,v5_20251120_quic_utiwari_crypto_qce" ;;
        gaming)      echo "0122-interconnect__qcom__sm8550__Enable_QoS,0154-dts-qcom-sm8550-add-opp-acd,0101-SM8550-Add-DDR-LLCC-L3,v5_20251120_quic_utiwari_crypto_qce" ;;
        gaming-l2)   echo "0100-SM8550-Fix-L2-cache-for-CPU2" ;;
        gaming-gpu)  echo "0120-20250728_konradybcio_gpu_cc_power" ;;
        gaming-l2gpu) echo "0100-SM8550-Fix-L2-cache-for-CPU2,0120-20250728_konradybcio_gpu_cc_power,0122-interconnect__qcom__sm8550__Enable_QoS,0154-dts-qcom-sm8550-add-opp-acd,0101-SM8550-Add-DDR-LLCC-L3,v5_20251120_quic_utiwari_crypto_qce" ;;
        *)
            echo "Unknown PERF_PROFILE=${1}" >&2
            echo "  full, gaming-qos, gaming-opp, gaming-bw, gaming-icc, gaming," >&2
            echo "  gaming-l2, gaming-gpu, gaming-l2gpu" >&2
            return 1
            ;;
    esac
}

resolve_effective_patch_skip() {
    local profile="${PERF_PROFILE:-full}"
    local from_profile from_env merged=""

    from_profile="$(perf_profile_skip_list "${profile}")" || return 1
    from_env="${PATCH_SKIP:-}"

    if [[ -n "${from_profile}" && -n "${from_env}" ]]; then
        merged="${from_profile},${from_env}"
    elif [[ -n "${from_profile}" ]]; then
        merged="${from_profile}"
    else
        merged="${from_env}"
    fi
    echo "${merged}"
}
